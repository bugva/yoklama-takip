name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages kökünde SPA; bilinmeyen yollar 404 yerine index dönsün
      - name: SPA fallback + doğrula (base / ile uyumlu)
        run: |
          cp dist/index.html dist/404.html
          grep -q 'src="/assets/' dist/index.html || (echo "Beklenmeyen index.html"; exit 1)

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Özel alan için gh-pages kökünde CNAME (Pages ayarıyla uyumlu olmalı)
          cname: www.attendordance.app
